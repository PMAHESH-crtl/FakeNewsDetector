<!DOCTYPE html>
<html>
<head>
    <title>Fake News Detector</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
            padding: 50px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            background: #007BFF;
            color: white;
            padding: 10px 20px;
            border: none;
            margin-top: 15px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        .real { color: green; }
        .fake { color: red; }
    </style>
</head>

<body>
    <div class="container">
        <h1>📰 Fake News Detector</h1>

        <form method="POST" action="/predict">
            <textarea name="news" placeholder="Paste news content here..."></textarea>
            <br>
            <button type="submit">Analyze</button>
        </form>

        {% if prediction %}
            <div class="result {% if prediction == 'Real News' %}real{% else %}fake{% endif %}">
                {{ prediction }}
            </div>
        {% endif %}
    </div>
</body>
</html>
